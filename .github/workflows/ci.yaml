name: ci
on:
  pull_request: {}

# Least-privilege default: CI only reads the repo to build and test.
permissions:
  contents: read

jobs:
  # Key-free mocked critical-path smoke gate (connect -> upsert -> query).
  # Runs on every PR with NO PINECONE_API_KEY to prove the request/response
  # plumbing works without a real backend. Keyed suites stay in `build` below.
  smoke-mocked:
    name: Smoke (mocked, no key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Install dependencies
        run: go get ./pinecone
      # No PINECONE_API_KEY in env: proves the mocked critical path needs none.
      # The `smoke` build tag + explicit -run pattern target only smoke/, and
      # `go test` exits 0 with "[no tests to run]" if the pattern matches
      # nothing (e.g. smoke/ is moved or emptied). The PASS-marker grep below is
      # the zero-test guard: it fails the job in that case rather than silently
      # passing by running nothing. `set -o pipefail` preserves a real test
      # failure's non-zero exit through the tee.
      - name: Run mocked critical-path smoke test
        run: |
          set -o pipefail
          go test -tags smoke -run '^TestMockedCriticalPath$' -v -count=1 ./smoke/... 2>&1 | tee smoke.log
          grep -q -- '--- PASS: TestMockedCriticalPath' smoke.log \
            || { echo "::error::mocked critical-path smoke test did not run"; exit 1; }

  build-and-test:
    runs-on: ubuntu-latest
    services:
      pc-index-serverless:
        image: ghcr.io/pinecone-io/pinecone-index:latest
        ports:
          - 5081:5081
        env:
          PORT: 5081
          DIMENSION: 1536
          METRIC: dotproduct
          INDEX_TYPE: serverless
      pc-index-pod:
        image: ghcr.io/pinecone-io/pinecone-index:latest
        ports:
          - 5082:5082
        env:
          PORT: 5082
          DIMENSION: 1536
          METRIC: cosine
          INDEX_TYPE: pod
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: Install dependencies
        run: |
          go get ./pinecone
      - name: Run tests
        run: go test -count=1 -v ./pinecone
        env:
          PINECONE_API_KEY: ${{ secrets.API_KEY }}
          PINECONE_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PINECONE_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      - name: Run local integration tests
        run: go test -count=1 -v ./pinecone -run TestRunLocalIntegrationSuite -tags=localServer -timeout=20m
        env:
          PINECONE_INDEX_URL_POD: http://localhost:5082
          PINECONE_INDEX_URL_SERVERLESS: http://localhost:5081
          PINECONE_DIMENSION: 1536
